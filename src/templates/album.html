<!-- Album Page -->
<div class="album-page">
  <a class="album-page__back" href="/">&larr; All releases</a>

  <div class="content-box">
    <div class="album-page__hero">
      <div class="album-page__cover">
        <img src="/images/album-covers/{{album_coverImage}}" alt="{{album_title}}">
      </div>
      <div class="album-page__details">
        <h2 class="album-page__title">{{album_title}}</h2>
        <p class="album-page__desc">{{album_longDescription}}</p>
        <p class="album-page__credits">{{album_credits}}</p>
        <p class="album-page__meta">Released {{album_releaseDate}}</p>
        <div class="featured-album__tags">{{album_tags_html}}</div>
        <div class="inline-player inline-player--tracklist">
          <iframe style="border: 0; width: 100%; max-width: 350px; height: 472px;" src="https://bandcamp.com/EmbeddedPlayer/album={{album_bandcampAlbumId}}/size=large/bgcol=333333/linkcol=e32c14/artwork=none/transparent=true/" seamless><a href="{{album_bandcampUrl}}">{{album_title}} by Harder Wins</a></iframe>
        </div>
        <div class="album-page__actions">
          <a class="btn" href="{{album_bandcampUrl}}" target="_blank" rel="noopener">Open on Bandcamp</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Game of Life LED display -->
  <div class="life-display-wrap">
    <canvas id="life-display" class="life-display" width="700" height="100" aria-hidden="true"></canvas>
  </div>

  <!-- More releases -->
  <section class="album-page__more">
    <h3 class="section-title">More releases</h3>
    <div class="album-grid">
      {{related_cards}}
    </div>
  </section>
</div>
